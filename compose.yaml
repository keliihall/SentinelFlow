services:
  sentinelflow-api:
    build:
      context: .
    image: sentinelflow:v1.0-rc-local
    ports:
      - "8080:8080"
    environment:
      SENTINELFLOW_API_BIND: 0.0.0.0:8080
      SENTINELFLOW_WORKSPACE_DIR: /data/.sentinelflow
      SENTINELFLOW_SCHEMA_ROOT: /app
      # v1.0-rc runtime storage is SQLite at /data/.sentinelflow/state.db.
      # Keep PostgreSQL settings out of the API container until the backend is
      # implemented; see docs/deployment/production-like.md.
      SENTINELFLOW_LOG_LEVEL: info
    volumes:
      - sentinelflow-workspace:/data/.sentinelflow
      - sentinelflow-plugins:/data/.sentinelflow/plugins
      - sentinelflow-reports:/data/.sentinelflow/reports
      - sentinelflow-logs:/data/.sentinelflow/logs
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  sentinelflow-workspace:
  sentinelflow-plugins:
  sentinelflow-reports:
  sentinelflow-logs:
