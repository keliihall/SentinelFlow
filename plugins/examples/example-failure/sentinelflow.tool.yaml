apiVersion: sentinelflow.io/v1alpha1
kind: ToolManifest
metadata:
  name: example-failure
  labels:
    sentinelflow.io/example: "true"
spec:
  displayName: Example Failure
  version: 0.1.0
  capabilities:
    - name: fail.fixture
      description: Exits unsuccessfully for scheduler failure-policy tests
      risk: low
      requiresApproval: false
  runtime:
    adapter: command
    mode: process
    entrypoint: runner/fail.py
    args: []
    environmentAllowlist:
      - PATH
    timeoutSeconds: 5
    outputLimitBytes: 1024
  parser:
    mode: builtin
    name: example-echo-v1
  inputSchema: schemas/input.schema.json
  outputSchema: schemas/output.schema.json
extensions:
  sentinelflow.io/safetyProfile: deterministic-failure-only

