apiVersion: sentinelflow.io/v1alpha1
kind: ToolManifest
metadata:
  name: example-docker-adapter
  labels:
    sentinelflow.io/example: "true"
spec:
  displayName: Example Docker Adapter
  version: 0.1.0
  capabilities:
    - name: echo
      description: Returns synthetic fixture data from an explicitly built local image
      risk: low
      requiresApproval: false
  runtime:
    adapter: docker
    mode: container
    timeoutSeconds: 5
    outputLimitBytes: 65536
    docker:
      image: sentinelflow/example-fixture:local
      command: []
      mounts: []
      network: none
      cpuMillis: 250
      memoryMib: 32
  parser:
    mode: builtin
    name: example-echo-v1
  inputSchema: schemas/input.schema.json
  outputSchema: schemas/output.schema.json
extensions:
  sentinelflow.io/safetyProfile: local-container-echo-only

