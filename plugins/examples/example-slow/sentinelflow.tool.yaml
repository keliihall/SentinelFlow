apiVersion: sentinelflow.io/v1alpha1
kind: ToolManifest
metadata:
  name: example-slow
  labels:
    sentinelflow.io/example: "true"
spec:
  displayName: Example Slow Fixture
  version: 0.1.0
  capabilities:
    - name: delay.fixture
      description: Delays a synthetic echo for cancellation tests
      risk: low
      requiresApproval: false
  runtime:
    adapter: command
    mode: process
    entrypoint: runner/slow.py
    args: []
    environmentAllowlist:
      - PATH
    timeoutSeconds: 10
    outputLimitBytes: 65536
  parser:
    mode: builtin
    name: example-echo-v1
  inputSchema: schemas/input.schema.json
  outputSchema: schemas/output.schema.json
extensions:
  sentinelflow.io/safetyProfile: bounded-delay-only

