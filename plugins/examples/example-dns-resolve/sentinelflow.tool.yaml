apiVersion: sentinelflow.io/v1alpha1
kind: ToolManifest
metadata:
  name: example-dns-resolve
  labels:
    sentinelflow.io/example: "true"
spec:
  displayName: Example DNS Resolve
  version: 0.1.0
  capabilities:
    - name: mock-dns-resolve
      description: Resolves approved fixture names using an embedded mock table
      risk: low
      requiresApproval: false
  runtime:
    mode: process
    entrypoint: runner/resolve.py
    args: []
    environmentAllowlist:
      - PATH
    timeoutSeconds: 5
    outputLimitBytes: 65536
  parser:
    mode: builtin
    name: example-dns-resolve-v1
  inputSchema: schemas/input.schema.json
  outputSchema: schemas/output.schema.json
extensions:
  sentinelflow.io/safetyProfile: local-mock-only
