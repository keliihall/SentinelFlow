apiVersion: sentinelflow.io/v1alpha1
kind: ToolManifest
metadata:
  name: example-structured-import
  labels:
    sentinelflow.io/example: "true"
spec:
  displayName: Example Structured Import
  version: 0.1.0
  capabilities:
    - name: import.fixture
      description: Imports caller-supplied synthetic structured content
      risk: low
      requiresApproval: false
  runtime:
    adapter: fileImport
    mode: process
    timeoutSeconds: 5
    outputLimitBytes: 65536
    fileImport:
      formats: [json, jsonl, csv]
      maxBytes: 65536
      maxRecords: 100
  parser:
    mode: builtin
    name: example-file-import-v1
  inputSchema: schemas/input.schema.json
  outputSchema: schemas/output.schema.json
extensions:
  sentinelflow.io/safetyProfile: caller-content-only

