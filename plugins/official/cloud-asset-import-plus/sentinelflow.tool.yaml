apiVersion: sentinelflow.io/v1alpha1
kind: ToolManifest
metadata:
  name: cloud-asset-import-plus
  labels:
    sentinelflow.io/official: "true"
    sentinelflow.io/asset-category: cloud
spec:
  displayName: Cloud Asset Import Plus
  version: 0.1.0
  capabilities:
    - name: data.import.cloud_asset
      description: Imports bounded provider-native JSON inventories from Alibaba Cloud, Tencent Cloud, Huawei Cloud, AWS, and Azure
      risk: low
      requiresApproval: false
    - name: asset.cloud.inventory
      description: Normalizes compute, public IP, load balancer, security group, DNS, object storage, WAF, and CDN assets
      risk: low
      requiresApproval: false
  runtime:
    adapter: command
    mode: process
    entrypoint: runner/runner.py
    args: []
    environmentAllowlist:
      - PATH
    timeoutSeconds: 300
    outputLimitBytes: 4194304
  parser:
    mode: builtin
    name: cloud-asset-import-plus-v1
  inputSchema: schemas/input.schema.json
  outputSchema: schemas/output.schema.json
extensions:
  sentinelflow.io/category: data.import
  sentinelflow.io/riskLevel: low
  sentinelflow.io/safetyProfile: bounded-offline-multicloud-inventory-import
  sentinelflow.io/networkBoundary: no-network-file-under-plugin-root-only
  sentinelflow.io/capabilities:
    - name: cloud_inventory_import
      riskLevel: low
      impact: read_only
      requiresApproval: false
  sentinelflow.io/controls:
    requiresAuthorization: true
    requiresApproval: false
    supportsRateLimit: false
    supportsConcurrencyLimit: false
    defaultMode: fixture
    maxConcurrency: 1
    secretTransport: none
  sentinelflow.io/audit:
    recordInput: true
    recordOutputSummary: true
    recordRawOutput: false
    evidenceRequired: true
