apiVersion: sentinelflow.io/v1alpha1
kind: ToolManifest
metadata:
  name: nessus-import-plus
  labels:
    sentinelflow.io/official: "true"
    sentinelflow.io/asset-category: vulnerability-import
spec:
  displayName: Nessus Import Plus
  version: 0.1.0
  capabilities:
    - name: data.import.nessus.report
      description: Imports bounded Nessus XML, JSON, or CSV report fixtures into structured vulnerability findings without scanning targets
      risk: low
      requiresApproval: false
    - name: risk.vuln_import.nessus
      description: Normalizes Nessus vulnerabilities with host, port, service, CVE, CVSS, severity, plugin, and remediation metadata
      risk: low
      requiresApproval: false
  runtime:
    adapter: command
    mode: process
    entrypoint: runner/runner.py
    args: []
    environmentAllowlist:
      - PATH
    timeoutSeconds: 300
    outputLimitBytes: 4194304
  parser:
    mode: builtin
    name: nessus-import-plus-v1
  inputSchema: schemas/input.schema.json
  outputSchema: schemas/output.schema.json
extensions:
  sentinelflow.io/p5_6_status: fixture-only
  sentinelflow.io/category: data.import
  sentinelflow.io/riskLevel: low
  sentinelflow.io/safetyProfile: bounded-offline-nessus-report-import
  sentinelflow.io/networkBoundary: no-network-file-under-plugin-root-only
  sentinelflow.io/capabilities:
    - name: report_import
      riskLevel: low
      impact: read_only
      requiresApproval: false
  sentinelflow.io/controls:
    requiresAuthorization: true
    requiresApproval: false
    supportsRateLimit: false
    supportsConcurrencyLimit: false
    defaultMode: fixture
    maxConcurrency: 1
    secretTransport: none
  sentinelflow.io/audit:
    recordInput: true
    recordOutputSummary: true
    recordRawOutput: false
    evidenceRequired: true
