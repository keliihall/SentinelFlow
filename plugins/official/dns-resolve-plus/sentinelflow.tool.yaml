apiVersion: sentinelflow.io/v1alpha1
kind: ToolManifest
metadata:
  name: dns-resolve-plus
  labels:
    sentinelflow.io/official: "true"
    sentinelflow.io/asset-category: dns
spec:
  displayName: DNS Resolve Plus
  version: 0.1.0
  capabilities:
    - name: asset.dns.resolve.passive
      description: Resolves DNS observations from local fixtures, cache, and passive DNS intelligence without contacting target infrastructure
      risk: low
      requiresApproval: false
    - name: asset.dns.resolve.active_public_resolver
      description: Performs bounded active DNS resolution through configured resolvers when policy.allow_active_verify is true
      risk: medium
      requiresApproval: false
    - name: asset.dns.resolve.authoritative_trace
      description: Performs bounded authoritative DNS trace for authorized targets when active verification and risk acknowledgement are enabled
      risk: medium
      requiresApproval: false
    - name: asset.dns.resolve.external_intel
      description: Adapts third-party passive DNS intelligence with graceful missing-secret handling
      risk: low
      requiresApproval: false
  runtime:
    adapter: command
    mode: process
    entrypoint: runner/runner.py
    args: []
    environmentAllowlist:
      - PATH
    timeoutSeconds: 300
    outputLimitBytes: 4194304
  parser:
    mode: builtin
    name: dns-resolve-plus-v1
  inputSchema: schemas/input.schema.json
  outputSchema: schemas/output.schema.json
extensions:
  sentinelflow.io/category: asset.dns
  sentinelflow.io/riskLevel: low
  sentinelflow.io/safetyProfile: passive-intel-first-bounded-active-dns
  sentinelflow.io/networkBoundary: fixture-cache-passive-intel-default-active-dns-policy-gated
  sentinelflow.io/capabilities:
    - name: passive_intel
      riskLevel: low
      impact: read_only
      requiresApproval: false
    - name: active_public_resolver
      riskLevel: medium
      impact: active_verify
      requiresApproval: policy_dependent
      requiresPolicyFlag: allow_active_verify
    - name: authoritative_trace
      riskLevel: medium
      impact: active_verify
      requiresApproval: policy_dependent
      requiresPolicyFlag: allow_active_verify
    - name: external_dns_intel
      riskLevel: low
      impact: read_only
      requiresApproval: false
  sentinelflow.io/controls:
    requiresAuthorization: true
    requiresApproval: false
    supportsRateLimit: true
    supportsConcurrencyLimit: true
    secretTransport: pending-sentinelflow-secret-config
    maxConcurrency: 10
    defaultMode: passive_intel
  sentinelflow.io/audit:
    recordInput: true
    recordOutputSummary: true
    recordRawOutput: false
    evidenceRequired: true
