apiVersion: sentinelflow.io/v1alpha1
kind: ToolManifest
metadata:
  name: dns-resolve-plus
  labels:
    sentinelflow.io/official: "true"
    sentinelflow.io/asset-category: dns
spec:
  displayName: DNS Resolve Plus
  version: 0.1.0
  capabilities:
    - name: asset.dns.resolve.passive
      description: P5.6 disabled-future placeholder except local fixture/cache compatibility; no live DNS provider calls
      risk: low
      requiresApproval: false
    - name: asset.dns.resolve.active_public_resolver
      description: Disabled-future/P7 placeholder; public resolver verification is not executable in P5.6
      risk: medium
      requiresApproval: false
    - name: asset.dns.resolve.authoritative_trace
      description: Disabled-future/P7 placeholder; authoritative DNS trace is not executable in P5.6
      risk: medium
      requiresApproval: false
    - name: asset.dns.resolve.external_intel
      description: Disabled-future/P7 placeholder; live external DNS intelligence calls are not executable in P5.6
      risk: low
      requiresApproval: false
  runtime:
    adapter: command
    mode: process
    entrypoint: runner/runner.py
    args: []
    environmentAllowlist:
      - PATH
    timeoutSeconds: 300
    outputLimitBytes: 4194304
  parser:
    mode: builtin
    name: dns-resolve-plus-v1
  inputSchema: schemas/input.schema.json
  outputSchema: schemas/output.schema.json
extensions:
  sentinelflow.io/p5_6_status: disabled-future
  sentinelflow.io/disabledFuture: dns-resolve-plus
  sentinelflow.io/category: asset.dns
  sentinelflow.io/riskLevel: low
  sentinelflow.io/safetyProfile: p5-6-disabled-future-no-public-resolver-no-provider-calls
  sentinelflow.io/networkBoundary: local-fixture-cache-only-no-public-resolver-no-provider-calls
  sentinelflow.io/capabilities:
    - name: passive_intel
      riskLevel: low
      impact: read_only
      p5_6_status: disabled-future-local-fixture-only
      requiresApproval: false
    - name: active_public_resolver
      riskLevel: medium
      impact: active_verify
      p5_6_status: disabled-future
      requiresApproval: policy_dependent
      requiresPolicyFlag: allow_active_verify
    - name: authoritative_trace
      riskLevel: medium
      impact: active_verify
      p5_6_status: disabled-future
      requiresApproval: policy_dependent
      requiresPolicyFlag: allow_active_verify
    - name: external_dns_intel
      riskLevel: low
      impact: read_only
      p5_6_status: disabled-future
      requiresApproval: false
  sentinelflow.io/controls:
    requiresAuthorization: true
    requiresApproval: false
    supportsRateLimit: true
    supportsConcurrencyLimit: true
    secretTransport: pending-sentinelflow-secret-config
    maxConcurrency: 10
    defaultMode: fixture
  sentinelflow.io/audit:
    recordInput: true
    recordOutputSummary: true
    recordRawOutput: false
    evidenceRequired: true
