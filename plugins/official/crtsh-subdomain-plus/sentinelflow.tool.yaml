apiVersion: sentinelflow.io/v1alpha1
kind: ToolManifest
metadata:
  name: crtsh-subdomain-plus
  labels:
    sentinelflow.io/official: "true"
    sentinelflow.io/asset-category: subdomain
spec:
  displayName: crt.sh Subdomain Plus
  version: 0.1.0
  capabilities:
    - name: asset.subdomain.crtsh.passive
      description: Imports crt.sh-style certificate transparency observations and extracts cleaned subdomain assets without active target connections
      risk: low
      requiresApproval: false
    - name: asset.tls_certificate.ct.passive
      description: Preserves certificate transparency timeline and SAN evidence for downstream TLS and asset-correlation workflows
      risk: low
      requiresApproval: false
  runtime:
    adapter: command
    mode: process
    entrypoint: runner/runner.py
    args: []
    environmentAllowlist:
      - PATH
    timeoutSeconds: 300
    outputLimitBytes: 4194304
  parser:
    mode: builtin
    name: crtsh-subdomain-plus-v1
  inputSchema: schemas/input.schema.json
  outputSchema: schemas/output.schema.json
extensions:
  sentinelflow.io/p5_6_status: disabled-future
  sentinelflow.io/category: asset.subdomain
  sentinelflow.io/riskLevel: low
  sentinelflow.io/safetyProfile: passive-certificate-transparency-import
  sentinelflow.io/networkBoundary: fixture-cache-default-provider-query-target-derived
  sentinelflow.io/capabilities:
    - name: passive_intel
      riskLevel: low
      impact: passive_intel
      requiresApproval: false
  sentinelflow.io/controls:
    requiresAuthorization: true
    requiresApproval: false
    supportsRateLimit: true
    supportsConcurrencyLimit: false
    defaultMode: passive_intel
    maxConcurrency: 1
    secretTransport: none
  sentinelflow.io/audit:
    recordInput: true
    recordOutputSummary: true
    recordRawOutput: false
    evidenceRequired: true
