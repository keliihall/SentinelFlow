apiVersion: sentinelflow.io/v1alpha1
kind: ToolManifest
metadata:
  name: cmdb-sync-plus
  labels:
    sentinelflow.io/official: "true"
    sentinelflow.io/asset-category: cmdb
spec:
  displayName: CMDB Sync Plus
  version: 0.1.0
  capabilities:
    - name: data.import.cmdb
      description: Imports bounded CMDB JSON or CSV asset inventories with ownership and business mappings
      risk: low
      requiresApproval: false
    - name: data.export.cmdb.writeback_plan
      description: Produces deterministic create, update, and no-op CMDB writeback operations for an approved gateway
      risk: low
      requiresApproval: false
    - name: asset.cmdb
      description: Normalizes CMDB department, business system, owner, criticality, lifecycle, and asset identifiers
      risk: low
      requiresApproval: false
  runtime:
    adapter: command
    mode: process
    entrypoint: runner/runner.py
    args: []
    environmentAllowlist:
      - PATH
    timeoutSeconds: 300
    outputLimitBytes: 4194304
  parser:
    mode: builtin
    name: cmdb-sync-plus-v1
  inputSchema: schemas/input.schema.json
  outputSchema: schemas/output.schema.json
extensions:
  sentinelflow.io/category: data.import
  sentinelflow.io/riskLevel: low
  sentinelflow.io/safetyProfile: bounded-offline-cmdb-reconciliation
  sentinelflow.io/networkBoundary: no-network-file-under-plugin-root-only
  sentinelflow.io/capabilities:
    - name: cmdb_reconciliation
      riskLevel: low
      impact: read_only
      requiresApproval: false
  sentinelflow.io/controls:
    requiresAuthorization: true
    requiresApproval: false
    supportsRateLimit: false
    supportsConcurrencyLimit: false
    defaultMode: fixture
    maxConcurrency: 1
    secretTransport: none
  sentinelflow.io/audit:
    recordInput: true
    recordOutputSummary: true
    recordRawOutput: false
    evidenceRequired: true
