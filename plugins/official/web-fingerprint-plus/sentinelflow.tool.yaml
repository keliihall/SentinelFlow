apiVersion: sentinelflow.io/v1alpha1
kind: ToolManifest
metadata:
  name: web-fingerprint-plus
  labels:
    sentinelflow.io/official: "true"
    sentinelflow.io/asset-category: web-fingerprint
spec:
  displayName: Web Fingerprint Plus
  version: 0.1.0
  capabilities:
    - name: asset.web.fingerprint.passive
      description: Identifies low-impact Web technology fingerprints from fixtures, local cache, or upstream HTTP observations without issuing requests
      risk: low
      requiresApproval: false
  runtime:
    adapter: command
    mode: process
    entrypoint: runner/runner.py
    args: []
    environmentAllowlist:
      - PATH
    timeoutSeconds: 300
    outputLimitBytes: 4194304
  parser:
    mode: builtin
    name: web-fingerprint-plus-v1
  inputSchema: schemas/input.schema.json
  outputSchema: schemas/output.schema.json
extensions:
  sentinelflow.io/p5_6_status: disabled-p7-placeholder
  sentinelflow.io/category: asset.web_fingerprint
  sentinelflow.io/riskLevel: low
  sentinelflow.io/safetyProfile: passive-http-observation-fingerprint
  sentinelflow.io/networkBoundary: fixture-cache-upstream-http-only-no-active-requests
  sentinelflow.io/capabilities:
    - name: passive_intel
      riskLevel: low
      impact: read_only
      requiresApproval: false
  sentinelflow.io/controls:
    requiresAuthorization: true
    requiresApproval: false
    supportsRateLimit: false
    supportsConcurrencyLimit: false
    secretTransport: none
    maxConcurrency: 1
    defaultMode: passive_intel
  sentinelflow.io/audit:
    recordInput: true
    recordOutputSummary: true
    recordRawOutput: false
    evidenceRequired: true
