apiVersion: sentinelflow.io/v1alpha1
kind: ToolManifest
metadata:
  name: subdomain-discovery-plus
  labels:
    sentinelflow.io/official: "true"
    sentinelflow.io/asset-category: subdomain
spec:
  displayName: Subdomain Discovery Plus
  version: 0.1.0
  capabilities:
    - name: asset.subdomain.discovery
      description: P5.6 fixture-only local synthetic example validation; real subdomain discovery is disabled-future/P7 placeholder
      risk: low
      requiresApproval: false
    - name: passive.subdomain.discovery
      description: Reads local fixture/cache subdomain observations only; live public intelligence providers are disabled-future/P7 placeholders
      risk: low
      requiresApproval: false
    - name: active.subdomain.dictionary
      description: Disabled P7 placeholder for bounded dictionary-based DNS verification; not executable in P5.6
      risk: medium
      requiresApproval: true
  runtime:
    adapter: command
    mode: process
    entrypoint: runner/runner.py
    args: []
    environmentAllowlist:
      - PATH
    timeoutSeconds: 300
    outputLimitBytes: 4194304
  parser:
    mode: builtin
    name: subdomain-discovery-plus-v1
  inputSchema: schemas/input.schema.json
  outputSchema: schemas/output.schema.json
extensions:
  sentinelflow.io/p5_6_status: fixture-only
  sentinelflow.io/disabledFuture: real-asset-discovery
  sentinelflow.io/category: asset.subdomain
  sentinelflow.io/riskLevel: low
  sentinelflow.io/safetyProfile: p5-6-fixture-only-active-dns-disabled
  sentinelflow.io/networkBoundary: local-fixture-no-public-resolver-no-provider-calls
  sentinelflow.io/capabilities:
    - name: passive subdomain discovery
      impact: read_only
      p5_6_status: fixture-only
    - name: active dictionary DNS enumeration
      impact: low_impact
      p5_6_status: disabled-p7-placeholder
      disabledFuture: true
      requiresPolicyFlag: allow_active_verify
  sentinelflow.io/controls:
    requiresAuthorization: true
    requiresApproval: false
    supportsRateLimit: true
    supportsConcurrencyLimit: true
    maxConcurrency: 1
    defaultMode: fixture
  sentinelflow.io/audit:
    recordInput: true
    recordOutputSummary: true
    recordRawOutput: false
    evidenceRequired: true
