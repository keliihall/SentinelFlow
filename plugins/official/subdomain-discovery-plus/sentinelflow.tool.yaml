apiVersion: sentinelflow.io/v1alpha1
kind: ToolManifest
metadata:
  name: subdomain-discovery-plus
  labels:
    sentinelflow.io/official: "true"
    sentinelflow.io/asset-category: subdomain
spec:
  displayName: Subdomain Discovery Plus
  version: 0.1.0
  capabilities:
    - name: asset.subdomain.discovery
      description: Discovers authorized subdomains through bounded passive sources and optional active DNS dictionary verification
      risk: low
      requiresApproval: false
    - name: passive.subdomain.discovery
      description: Reads low-frequency passive subdomain sources, including local fixtures and optional Certificate Transparency data
      risk: low
      requiresApproval: false
    - name: active.subdomain.dictionary
      description: Performs bounded dictionary-based DNS A and AAAA verification when policy.allow_active_verify is true
      risk: low
      requiresApproval: false
  runtime:
    adapter: command
    mode: process
    entrypoint: runner/runner.py
    args: []
    environmentAllowlist:
      - PATH
    timeoutSeconds: 300
    outputLimitBytes: 4194304
  parser:
    mode: builtin
    name: subdomain-discovery-plus-v1
  inputSchema: schemas/input.schema.json
  outputSchema: schemas/output.schema.json
extensions:
  sentinelflow.io/category: asset.subdomain
  sentinelflow.io/riskLevel: low
  sentinelflow.io/safetyProfile: authorized-passive-and-bounded-dns-only
  sentinelflow.io/networkBoundary: passive-http-optional-active-dns-only
  sentinelflow.io/capabilities:
    - name: passive subdomain discovery
      impact: read_only
    - name: active dictionary DNS enumeration
      impact: low_impact
      requiresPolicyFlag: allow_active_verify
  sentinelflow.io/controls:
    requiresAuthorization: true
    requiresApproval: false
    supportsRateLimit: true
    supportsConcurrencyLimit: true
    maxConcurrency: 5
  sentinelflow.io/audit:
    recordInput: true
    recordOutputSummary: true
    recordRawOutput: false
    evidenceRequired: true
