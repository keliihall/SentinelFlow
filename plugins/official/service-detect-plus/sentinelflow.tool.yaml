apiVersion: sentinelflow.io/v1alpha1
kind: ToolManifest
metadata:
  name: service-detect-plus
  labels:
    sentinelflow.io/official: "true"
    sentinelflow.io/asset-category: service
spec:
  displayName: Service Detect Plus
  version: 0.1.0
  capabilities:
    - name: asset.service.detect.passive
      description: P5.6 disabled-future placeholder except local fixture/cache compatibility; no live service probing
      risk: low
      requiresApproval: false
    - name: asset.service.detect.safe
      description: Disabled-future/P7 placeholder; safe active service checks are not executable in P5.6
      risk: medium
      requiresApproval: false
    - name: asset.service.detect.standard
      description: Disabled-future/P7 placeholder; standard active service handshakes are not executable in P5.6
      risk: medium
      requiresApproval: false
    - name: asset.service.detect.deep
      description: Disabled-future/P7 placeholder; deep fingerprinting is outside P5.6
      risk: high
      requiresApproval: true
    - name: asset.service.detect.external_fingerprint
      description: Disabled-future/P7 placeholder; external fingerprint tool adapters are outside P5.6
      risk: high
      requiresApproval: true
  runtime:
    adapter: command
    mode: process
    entrypoint: runner/runner.py
    args: []
    environmentAllowlist:
      - PATH
    timeoutSeconds: 300
    outputLimitBytes: 4194304
  parser:
    mode: builtin
    name: service-detect-plus-v1
  inputSchema: schemas/input.schema.json
  outputSchema: schemas/output.schema.json
extensions:
  sentinelflow.io/p5_6_status: disabled-future
  sentinelflow.io/disabledFuture: service-detect-plus
  sentinelflow.io/category: asset.service
  sentinelflow.io/riskLevel: low
  sentinelflow.io/safetyProfile: p5-6-disabled-future-no-service-probing-no-provider-calls
  sentinelflow.io/networkBoundary: local-fixture-cache-upstream-only-no-active-service-probes
  sentinelflow.io/capabilities:
    - name: passive_intel
      riskLevel: low
      impact: read_only
      p5_6_status: disabled-future-local-fixture-only
      requiresApproval: false
    - name: safe
      riskLevel: medium
      impact: low_impact
      p5_6_status: disabled-future
      requiresApproval: policy_dependent
      requiresPolicyFlag: allow_active_verify
    - name: standard
      riskLevel: medium
      impact: active_verify
      p5_6_status: disabled-future
      requiresApproval: policy_dependent
      requiresPolicyFlag: allow_active_verify
    - name: deep
      riskLevel: high
      impact: lab_only
      p5_6_status: disabled-future
      requiresApproval: true
      requiresPolicyFlag: allow_high_risk
    - name: external_fingerprint
      riskLevel: high
      impact: lab_only
      p5_6_status: disabled-future
      requiresApproval: true
      requiresPolicyFlag: allow_high_risk
  sentinelflow.io/controls:
    requiresAuthorization: true
    supportsRateLimit: true
    supportsConcurrencyLimit: true
    defaultMode: fixture
    maxConcurrency: 10
    secretTransport: pending-sentinelflow-secret-config
  sentinelflow.io/audit:
    recordInput: true
    recordOutputSummary: true
    recordRawOutput: false
    evidenceRequired: true
