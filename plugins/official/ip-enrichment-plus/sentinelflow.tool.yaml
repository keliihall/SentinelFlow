apiVersion: sentinelflow.io/v1alpha1
kind: ToolManifest
metadata:
  name: ip-enrichment-plus
  labels:
    sentinelflow.io/official: "true"
    sentinelflow.io/asset-category: ip-enrichment
spec:
  displayName: IP Enrichment Plus
  version: 0.1.0
  capabilities:
    - name: asset.ip.enrich.passive
      description: Enriches IP assets with ASN, organization, ISP, geolocation, cloud, CDN, WAF, and address classification from fixtures, cache, or configured passive providers
      risk: low
      requiresApproval: false
    - name: asset.ip.classify.local
      description: Classifies public, private, loopback, link-local, multicast, documentation, reserved, and unspecified addresses without network access
      risk: low
      requiresApproval: false
  runtime:
    adapter: command
    mode: process
    entrypoint: runner/runner.py
    args: []
    environmentAllowlist:
      - PATH
      - IPINFO_TOKEN
      - MAXMIND_LICENSE_KEY
    timeoutSeconds: 300
    outputLimitBytes: 4194304
  parser:
    mode: builtin
    name: ip-enrichment-plus-v1
  inputSchema: schemas/input.schema.json
  outputSchema: schemas/output.schema.json
extensions:
  sentinelflow.io/p5_6_status: disabled-p7-placeholder
  sentinelflow.io/category: asset.ip
  sentinelflow.io/riskLevel: low
  sentinelflow.io/safetyProfile: passive-ip-enrichment-and-local-classification
  sentinelflow.io/networkBoundary: fixture-cache-default-provider-secret-gated
  sentinelflow.io/capabilities:
    - name: passive_intel
      riskLevel: low
      impact: passive_intel
      requiresApproval: false
  sentinelflow.io/controls:
    requiresAuthorization: true
    requiresApproval: false
    supportsRateLimit: true
    supportsConcurrencyLimit: false
    defaultMode: passive_intel
    maxConcurrency: 1
    secretTransport: environment_or_future_secret_config
  sentinelflow.io/audit:
    recordInput: true
    recordOutputSummary: true
    recordRawOutput: false
    evidenceRequired: true
