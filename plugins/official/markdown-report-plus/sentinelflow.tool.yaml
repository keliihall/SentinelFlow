apiVersion: sentinelflow.io/v1alpha1
kind: ToolManifest
metadata:
  name: markdown-report-plus
  labels:
    sentinelflow.io/official: "true"
    sentinelflow.io/asset-category: report
spec:
  displayName: Markdown Report Plus
  version: 0.1.0
  capabilities:
    - name: report.markdown.generate
      description: Generates a bounded Markdown delivery report from normalized SentinelFlow findings, errors, and audit summaries
      risk: low
      requiresApproval: false
    - name: report.asset.discovery.summary
      description: Produces an asset-discovery-oriented Markdown summary from already normalized upstream results
      risk: low
      requiresApproval: false
  runtime:
    adapter: command
    mode: process
    entrypoint: runner/runner.py
    args: []
    environmentAllowlist:
      - PATH
    timeoutSeconds: 300
    outputLimitBytes: 4194304
  parser:
    mode: builtin
    name: markdown-report-plus-v1
  inputSchema: schemas/input.schema.json
  outputSchema: schemas/output.schema.json
extensions:
  sentinelflow.io/p5_6_status: fixture-only
  sentinelflow.io/category: report.analysis
  sentinelflow.io/riskLevel: low
  sentinelflow.io/safetyProfile: normalized-input-only-bounded-redacted-report-generation
  sentinelflow.io/networkBoundary: no-network-no-shell-no-provider
  sentinelflow.io/capabilities:
    - name: markdown_report
      riskLevel: low
      impact: read_only
      requiresApproval: false
  sentinelflow.io/controls:
    requiresAuthorization: true
    requiresApproval: false
    supportsRateLimit: false
    supportsConcurrencyLimit: false
    defaultMode: summary
    maxConcurrency: 1
    secretTransport: none
  sentinelflow.io/audit:
    recordInput: true
    recordOutputSummary: true
    recordRawOutput: false
    evidenceRequired: true
