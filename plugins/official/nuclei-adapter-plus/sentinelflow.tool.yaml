apiVersion: sentinelflow.io/v1alpha1
kind: ToolManifest
metadata:
  name: nuclei-adapter-plus
  labels:
    sentinelflow.io/official: "true"
    sentinelflow.io/asset-category: web-scan
spec:
  displayName: Nuclei Adapter Plus
  version: 0.1.0
  capabilities:
    - name: risk.web_scan.nuclei.import
      description: Imports bounded Nuclei JSONL findings with template allowlist and severity/tag policy controls
      risk: low
      requiresApproval: false
    - name: risk.vuln_verify.nuclei.result
      description: Normalizes approved Nuclei template results into structured SentinelFlow findings without executing templates
      risk: low
      requiresApproval: false
  runtime:
    adapter: command
    mode: process
    entrypoint: runner/runner.py
    args: []
    environmentAllowlist:
      - PATH
    timeoutSeconds: 300
    outputLimitBytes: 4194304
  parser:
    mode: builtin
    name: nuclei-adapter-plus-v1
  inputSchema: schemas/input.schema.json
  outputSchema: schemas/output.schema.json
extensions:
  sentinelflow.io/category: risk.web_scan
  sentinelflow.io/riskLevel: low
  sentinelflow.io/safetyProfile: bounded-offline-nuclei-jsonl-import
  sentinelflow.io/networkBoundary: no-network-file-under-plugin-root-only
  sentinelflow.io/capabilities:
    - name: nuclei_result_import
      riskLevel: low
      impact: read_only
      requiresApproval: false
  sentinelflow.io/controls:
    requiresAuthorization: true
    requiresApproval: false
    supportsRateLimit: false
    supportsConcurrencyLimit: false
    defaultMode: fixture
    maxConcurrency: 1
    secretTransport: none
  sentinelflow.io/audit:
    recordInput: true
    recordOutputSummary: true
    recordRawOutput: false
    evidenceRequired: true
