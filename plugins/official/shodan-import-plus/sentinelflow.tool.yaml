apiVersion: sentinelflow.io/v1alpha1
kind: ToolManifest
metadata:
  name: shodan-import-plus
  labels:
    sentinelflow.io/official: "true"
    sentinelflow.io/asset-category: exposure-intel
spec:
  displayName: Shodan Import Plus
  version: 0.1.0
  capabilities:
    - name: data.import.shodan.passive
      description: Imports Shodan-style host exposure intelligence from fixtures, local cache, or a configured provider without accepting arbitrary user query strings
      risk: low
      requiresApproval: false
    - name: asset.exposure_intel.shodan
      description: Normalizes public host exposure intelligence for ports, services, banners, certificates, and historical observations
      risk: low
      requiresApproval: false
  runtime:
    adapter: command
    mode: process
    entrypoint: runner/runner.py
    args: []
    environmentAllowlist:
      - PATH
      - SHODAN_API_KEY
    timeoutSeconds: 300
    outputLimitBytes: 4194304
  parser:
    mode: builtin
    name: shodan-import-plus-v1
  inputSchema: schemas/input.schema.json
  outputSchema: schemas/output.schema.json
extensions:
  sentinelflow.io/p5_6_status: disabled-p7-placeholder
  sentinelflow.io/category: data.import
  sentinelflow.io/riskLevel: low
  sentinelflow.io/safetyProfile: controlled-target-derived-host-intel-import
  sentinelflow.io/networkBoundary: fixture-cache-default-provider-query-secret-gated
  sentinelflow.io/capabilities:
    - name: passive_intel
      riskLevel: low
      impact: passive_intel
      requiresApproval: false
  sentinelflow.io/controls:
    requiresAuthorization: true
    requiresApproval: false
    supportsRateLimit: true
    supportsConcurrencyLimit: false
    secretTransport: environment_or_future_secret_config
    maxConcurrency: 1
    defaultMode: passive_intel
  sentinelflow.io/audit:
    recordInput: true
    recordOutputSummary: true
    recordRawOutput: false
    evidenceRequired: true
