apiVersion: sentinelflow.io/v1alpha1
kind: TaskSpec
metadata:
  name: p7-disabled-placeholder-asset-discovery
  labels:
    target: example.test
    authorizationScope: placeholder:p7-disabled
    purpose: future-p7-placeholder
spec:
  authorizationScope: placeholder:p7-disabled
  targets:
    - name: example.test
      input:
        context:
          task_id: p7-disabled-placeholder-asset-discovery
          run_id: run_placeholder_full_asset_discovery
          operator: admin
          workspace: default
          authorization_scope: placeholder:p7-disabled
        target:
          type: domain
          value: example.test
          metadata:
            p5_6_status: disabled-p7-placeholder
        options:
          mode: dry_run
          passive:
            enabled: true
            sources: []
            crtsh_enabled: false
            crtsh_timeout_seconds: 10
          active:
            enabled: false
            dry_run: true
            wordlist_file: examples/wordlist.small.txt
            resolvers: []
            record_types: [A, AAAA]
            timeout_seconds: 3
            concurrency: 5
            rate_limit_per_second: 5
            max_candidates: 500
            detect_wildcard: true
          output:
            include_unresolved: true
            include_sources: true
        policy:
          allow_active_verify: false
          allow_high_risk: false
  steps:
    - name: discover-subdomains
      toolRef: subdomain-discovery-plus
      capability: asset.subdomain.discovery
      outputAs: subdomains
      failurePolicy: continue
      input:
        context:
          task_id: p7-disabled-placeholder-asset-discovery
          run_id: run_placeholder_subdomains
          operator: admin
          workspace: default
          authorization_scope: placeholder:p7-disabled
        target:
          type: domain
          value: example.test
          metadata:
            p5_6_status: disabled-p7-placeholder
        options:
          mode: hybrid
          passive:
            enabled: true
            sources: []
            crtsh_enabled: false
            crtsh_timeout_seconds: 10
          active:
            enabled: false
            dry_run: true
            wordlist_file: examples/wordlist.small.txt
            resolvers: []
            record_types: [A, AAAA]
            timeout_seconds: 3
            concurrency: 5
            rate_limit_per_second: 5
            max_candidates: 500
            detect_wildcard: true
          output:
            include_unresolved: true
            include_sources: true
        policy:
          allow_active_verify: false
          allow_high_risk: false
    - name: resolve-dns
      toolRef: dns-resolve-plus
      capability: asset.dns.resolve.passive
      dependsOn: [discover-subdomains]
      outputAs: dns_records
      failurePolicy: continue
      input:
        context:
          task_id: p7-disabled-placeholder-asset-discovery
          run_id: run_placeholder_dns
          operator: admin
          workspace: default
          authorization_scope: placeholder:p7-disabled
        target:
          type: domain
          value: example.test
          metadata:
            p5_6_status: disabled-p7-placeholder
        inputs:
          domains: []
          findings: []
        options:
          mode: hybrid
          record_types: [A, AAAA, CNAME, MX, NS, TXT]
          passive_intel:
            enabled: true
            sources: [local_cache, passive_dns_cache]
            api_timeout_seconds: 10
            api_rate_limit_per_second: 1
            max_queries: 100
            allow_missing_secrets: true
            local_cache_file: examples/cache.empty.json
            passive_dns_cache_file: examples/cache.empty.json
          active:
            enabled: false
            resolver_mode: disabled_p7_placeholder
            resolvers: []
            authoritative_trace: false
            timeout_seconds: 3
            concurrency: 10
            rate_limit_per_second: 10
            max_domains: 1000
            max_queries: 5000
          merge:
            deduplicate: true
            conflict_policy: preserve_all_sources
            mark_source_disagreement: true
            confidence_strategy: weighted_sources
            stale_after_days: 30
          output:
            include_unresolved: true
            include_source_details: true
            include_conflicts: true
          risk_acknowledged: false
          execution_profile: disabled_p7_placeholder
        policy:
          allow_active_verify: false
          allow_high_risk: false
      inputFrom:
        - from: subdomains
          pointer: /spec/findings
          target: /inputs/findings
    - name: probe-ports
      toolRef: port-probe-plus
      capability: asset.port.probe.passive
      dependsOn: [resolve-dns]
      outputAs: open_ports
      failurePolicy: continue
      input:
        context:
          task_id: p7-disabled-placeholder-asset-discovery
          run_id: run_placeholder_ports
          operator: admin
          workspace: default
          authorization_scope: placeholder:p7-disabled
        target:
          type: domain
          value: example.test
          metadata:
            p5_6_status: disabled-p7-placeholder
        inputs:
          addresses: []
          findings: []
        options:
          mode: hybrid
          passive_intel:
            enabled: true
            sources: [local_cache]
            allow_missing_secrets: true
            api_timeout_seconds: 10
            api_rate_limit_per_second: 1
            max_queries: 100
            local_cache_file: examples/cache.empty.json
          active:
            enabled: false
            probe_engine: disabled_p7_placeholder
            port_profile: custom
            ports: []
            timeout_seconds: 2
            concurrency: 10
            rate_limit_per_second: 10
            max_targets: 100
            max_ports: 20
          merge:
            deduplicate: true
            conflict_policy: preserve_all_sources
            mark_source_disagreement: true
            confidence_strategy: weighted_sources
            stale_after_days: 30
          output:
            include_closed: false
            include_filtered: false
            include_source_details: true
            include_conflicts: true
          execution_profile: disabled_p7_placeholder
        policy:
          allow_active_verify: false
          allow_high_risk: false
      inputFrom:
        - from: dns_records
          pointer: /spec/findings
          target: /inputs/findings
    - name: detect-services
      toolRef: service-detect-plus
      capability: asset.service.detect.passive
      dependsOn: [probe-ports]
      outputAs: services
      failurePolicy: continue
      input:
        context:
          task_id: p7-disabled-placeholder-asset-discovery
          run_id: run_placeholder_services
          operator: admin
          workspace: default
          authorization_scope: placeholder:p7-disabled
        target:
          type: service
          value: example.test:443
          metadata:
            p5_6_status: disabled-p7-placeholder
        inputs:
          services: []
          findings: []
        options:
          mode: hybrid
          detection_depth: safe
          passive_intel:
            enabled: true
            sources: [local_cache]
            prefer_sources: [local_cache]
            api_timeout_seconds: 10
            api_rate_limit_per_second: 1
            max_queries: 100
            allow_missing_secrets: true
            local_cache_file: examples/cache.empty.json
          active:
            enabled: false
            probe_profiles: []
            timeout_seconds: 3
            concurrency: 5
            rate_limit_per_second: 5
            max_services: 100
            max_probes_per_service: 4
            max_response_bytes: 4096
          merge:
            deduplicate: true
            conflict_policy: preserve_all_sources
            mark_source_disagreement: true
            confidence_strategy: weighted_sources
            stale_after_days: 30
          output:
            include_unknown: false
            include_source_details: true
            include_conflicts: true
            mask_sensitive_headers: true
            truncate_banner_bytes: 512
          risk_acknowledged: false
          execution_profile: disabled_p7_placeholder
        policy:
          allow_active_verify: false
          allow_high_risk: false
      inputFrom:
        - from: open_ports
          pointer: /spec/findings
          target: /inputs/findings
  policy:
    allowedTargets: [example.test]
    targetPatterns:
      - domain:example.test
      - domain:*.example.test
    approveHighRisk: false
    timeoutSeconds: 300
    maxConcurrency: 3
    rateLimitPerMinute: 300
    outputRetention:
      days: 30
      retainEvidence: true
extensions: {}
