name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SENTINELFLOW_CI_RUST: "1.85.0"

jobs:
  rust:
    name: Rust workspace and release gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.SENTINELFLOW_CI_RUST }}
          components: clippy, rustfmt

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: CI marker
        run: |
          echo "SentinelFlow CI workflow: ${GITHUB_WORKFLOW}"
          echo "CI_COMMIT_SHA=${GITHUB_SHA}"
          echo "P5_6_GATE=scripts/p5_6_gates.sh"
          echo "SentinelFlow CI ref: ${GITHUB_REF}"

      - name: Show tool versions
        run: |
          rustc --version
          cargo --version
          python3 --version
          node --version

      - name: Build workspace
        run: cargo build --workspace --all-features

      - name: P5.6 aggregate gate
        run: scripts/p5_6_gates.sh
